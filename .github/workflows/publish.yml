name: Publish to Nuget

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  SOLUTION_FILE: SharedKernel.slnx
  PACK_OUTPUT: artifacts/package/release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_FILE }}" --configuration Release --no-restore

      - name: Test
        run: dotnet test "${{ env.SOLUTION_FILE }}" --configuration Release --no-build --no-restore --verbosity normal

      - name: Pack
        run: dotnet pack "${{ env.SOLUTION_FILE }}" --configuration Release --no-build --no-restore --output "${{ env.PACK_OUTPUT }}"

      - name: NuGet login (OIDC Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/')   # EXTRA GUARD: only push if building a tag.
        run: |
          dotnet nuget push "${{ env.PACK_OUTPUT }}/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate