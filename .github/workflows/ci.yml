name: Build and Test

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          fetch-depth: 0

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore SharedKernel.slnx

    - name: Build
      run: dotnet build SharedKernel.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test SharedKernel.slnx --configuration Release --no-build --no-restore --verbosity normal